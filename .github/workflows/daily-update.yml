name: Daily Fuel Price Data Update

on:
  schedule:
    # Runs at 1:00 UTC daily, which is 9:00 AM UTC+8
    - cron: "0 1 * * *"
  # Allow manual trigger
  workflow_dispatch:

permissions:
  # Allow writing code to repository
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install UV package manager
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          # Enable UV cache
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Update China refined oil price data
        run: uv run scripts/fetch_sinopec_prices.py

      - name: Update Brent crude oil price data
        run: uv run scripts/fetch_crude_oil_prices.py
        env:
          # Read API key from repository Secrets
          OILPRICEAPI_APIKEY: ${{ secrets.OILPRICEAPI_APIKEY }}

      - name: Check for changes in data files
        id: git-check
        run: |
          if git diff --exit-code data/; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "chore: auto-update gas and crude oil prices"
          git push
